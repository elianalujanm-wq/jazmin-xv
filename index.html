<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jaz - Mis XV</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            font-family:'Poppins',sans-serif;

            background:
            linear-gradient(rgba(255,240,245,.4),rgba(255,240,245,.4)),
            url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=1400&q=80');

            background-size:cover;
            background-position:center;
        }

        .portada{
            background:rgba(255,255,255,.75);
            padding:60px 40px;
            border-radius:30px;
            max-width:700px;
            backdrop-filter: blur(8px);
            box-shadow:0 8px 30px rgba(0,0,0,.15);
        }

        h2{
            color:#c9a227;
            font-size:2rem;
            letter-spacing:3px;
        }

        h1{
            font-family:'Great Vibes',cursive;
            font-size:7rem;
            color:#e88ab4;
            margin:20px 0;
        }

        p{
            color:#6b5060;
            font-size:1.2rem;
            line-height:1.8;
        }

        .fecha{
            margin-top:30px;
            color:#c9a227;
            font-weight:bold;
            font-size:1.3rem;
        }

    </style>

</head>

<body>

    <div class="portada">

        <h2>Mis XV</h2>

        <h1>Jaz</h1>

        <p>
            Dicen que los sueños más hermosos se viven con las personas que más queremos.
            Hoy comienza un capítulo inolvidable de mi historia, y sería un honor que formes parte de esta noche mágica que guardaré por siempre en mi corazón. ✨
        </p>

        <div class="fecha">
            12 de septiembre de 2026 - 21:00 hs
        </div>

    </div>

</body>
</html>
